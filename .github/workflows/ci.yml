name: CI-CD Pipeline

on: workflow_dispatch

jobs:
  # 🔍 Lint first (fail fast)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - run: npm ci
      - run: npm run lint

  # 🧪 Run tests
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci
      - run: npm test

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

  # 🏗 Build & package app
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      # ✅ Prepare production-ready package
      - name: Prepare deploy package
        run: |
          npm prune --production
          mkdir deploy
          cp -r dist deploy/
          cp package.json deploy/
          cp -r public deploy/
          cp -r node_modules deploy/

      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: deploy

  # 🚀 Deploy to Azure
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: myacr1212
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
